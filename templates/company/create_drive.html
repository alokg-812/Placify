{% extends "base.html" %}

{% block title %}Create Placement Drive{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card">
            <div class="card-body p-4 bg-gradient bg-warning-subtle">
                <h3 class="card-title mb-4"><i class="bi bi-plus-circle"></i> Create Placement Drive</h3>
                <form method="POST">
                    <div class="mb-3">
                        <label for="job_title" class="form-label">Job Title</label>
                        <input type="text" class="form-control" id="job_title" name="job_title" placeholder="e.g., Frontend Intern" required>
                    </div>
                    <div class="mb-3">
                        <label for="job_description" class="form-label">Job Description</label>
                        <textarea class="form-control" id="job_description" name="job_description" rows="5" placeholder="e.g., Seeking a technically proficient and detail oriented Frontend Developer Intern to contribute to the company's growth"></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="job_type" class="form-label">Job Type</label>
                            <select class="form-select" id="job_type" name="job_type">
                                <option value="">Select Type</option>
                                <option value="Full-time">Full-time</option>
                                <option value="Internship">Internship</option>
                                <option value="Contract">Contract</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="location" class="form-label">Location</label>
                            <input type="text" class="form-control" id="location" name="location" placeholder="e.g., Chennai">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="salary" class="form-label">Salary</label>
                            <input type="text" class="form-control" id="salary" name="salary" placeholder="e.g., 5-7 LPA">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="total_positions" class="form-label">Total Positions</label>
                            <input type="number" class="form-control" id="total_positions" name="total_positions">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="required_cgpa" class="form-label">Minimum CGPA</label>
                            <input type="number" step="0.01" class="form-control" id="required_cgpa" name="required_cgpa" min="0" max="10">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="eligible_departments" class="form-label">Eligible Departments</label>
                            <input type="text" class="form-control" id="eligible_departments" name="eligible_departments" placeholder="e.g., CSE, IT, ECE">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="eligible_years" class="form-label">Eligible Years</label>
                            <input type="text" class="form-control" id="eligible_years" name="eligible_years" placeholder="e.g., 3rd Year, 4th Year">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="deadline" class="form-label">Application Deadline</label>
                        <input type="date" class="form-control" id="deadline" name="deadline">
                    </div>
                    <button type="submit" class="btn btn-success">Create Drive</button>
                    <a href="{{ url_for('company.drives') }}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
