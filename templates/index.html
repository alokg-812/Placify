{% extends "base.html" %}

{% block title %}Placify | Home{% endblock %}

{% block content %}
<style>
    .hero {
        padding: 40px;
        background: linear-gradient(135deg, #f0f7ff 0%, #e0f2fe 40%, #fef3f2 100%);
        position: relative;
        overflow: hidden;
    }

    .hero h1 {
        font-weight: 800;
        line-height: 1.12;
        font-size: 3.6rem;
    }

    .highlight-blue {
        color: var(--primary);
    }

    .highlight-coral {
        color: var(--coral);
    }

    .lead {
        font-size: 1.3rem;
        color: var(--text-muted);
    }

    .bg-image {
        height: 400px;
        width: 100%;
        border-radius: 1.2rem;
        box-shadow: 0 30px 70px -15px rgba(0, 0, 0, 0.22);
    }
</style>

<section class="hero">
    <div class="container">
        <div class="row align-items-center gx-5">
            <div class="col-lg-6 text-center text-lg-start">
                <p class="fs-4 fw-medium text-muted mb-4 highlight-coral">Why Choose Us</p>

                <h1 class="mb-4">
                    Where <span class="highlight-blue">ambition</span><br>
                    meets <span class="highlight-coral">opportunity</span>.
                </h1>

                <p class="lead mb-5">
                    <strong>Placify</strong> brings campuses and companies together with intelligent workflows,
                    transparent tracking, and faster hiring decisions.
                </p>

                <a href="{{ url_for('auth.login') }}" class="btn btn-outline-primary btn-lg">Get Started</a>
            </div>

            <div class="col-lg-6 mt-5 mt-lg-0">
                <img src="{{ url_for('static', filename='images/landingPageBGI.png') }}" class="bg-image img-fluid"
                    alt="Placify dashboard">
            </div>
        </div>
    </div>
</section>
{% endblock %}
