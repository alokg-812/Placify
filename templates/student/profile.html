{% extends "base.html" %}

{% block title %}Student Profile{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body p-4 bg-dark-subtle bg-gradient">
                <h3 class="card-title mb-4"><i class="bi bi-person-circle"></i> Student Profile</h3>
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="full_name" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="full_name" name="full_name" value="{{ student.full_name }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="phone" class="form-label">Phone</label>
                            <input type="tel" class="form-control" id="phone" name="phone" value="{{ student.phone or '' }}">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="department" class="form-label">Department</label>
                            <input type="text" class="form-control" id="department" name="department" value="{{ student.department or '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="year" class="form-label">Year</label>
                            <select class="form-select" id="year" name="year">
                                <option value="">Select Year</option>
                                <option value="1st Year" {% if student.year == '1st Year' %}selected{% endif %}>1st Year</option>
                                <option value="2nd Year" {% if student.year == '2nd Year' %}selected{% endif %}>2nd Year</option>
                                <option value="3rd Year" {% if student.year == '3rd Year' %}selected{% endif %}>3rd Year</option>
                                <option value="4th Year" {% if student.year == '4th Year' %}selected{% endif %}>4th Year</option>
                            </select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="cgpa" class="form-label">CGPA</label>
                            <input type="number" step="0.01" class="form-control" id="cgpa" name="cgpa" value="{{ student.cgpa or '' }}" min="0" max="10">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="resume_url" class="form-label">Resume URL</label>
                            <input type="url" class="form-control" id="resume_url" name="resume_url" value="{{ student.resume_url or '' }}">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Update Profile</button>
                    <a href="{{ url_for('student.dashboard') }}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
